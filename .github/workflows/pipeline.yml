name: Assignment 5 Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_accuracy:
        description: "Optional accuracy override (0.80 fail, 0.90 pass)"
        required: false
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
      FORCE_ACCURACY: ${{ github.event.inputs.force_accuracy }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Set forced accuracy
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_accuracy != '' }}
        run: echo "FORCE_ACCURACY=${{ github.event.inputs.force_accuracy }}" >> $GITHUB_ENV
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn
      
      - name: Pull data with DVC
        run: dvc pull --allow-missing -v || echo "No DVC data to pull"
      
      - name: Train model
        run: python train.py
      
      - name: Display mlruns structure
        run: |
          echo "MLruns directory structure:"
          find mlruns -type f 2>/dev/null | head -20 || echo "No mlruns directory found"
          echo ""
          echo "Model info content:"
          cat model_info.txt
      
      - name: Upload model_info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          if-no-files-found: error
      
      - name: Upload mlruns
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-store
          path: mlruns
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: pip install mlflow pyyaml
      
      - name: Download model_info
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .
      
      - name: Download mlruns
        uses: actions/download-artifact@v4
        with:
          name: mlruns-store
          path: mlruns
      
      - name: Verify downloaded artifacts
        run: |
          echo "Model info content:"
          cat model_info.txt
          echo ""
          echo "MLruns structure after download:"
          find mlruns -type f 2>/dev/null | head -20
          echo ""
          echo "Looking for run ID:"
          RUN_ID=$(cat model_info.txt)
          echo "Searching for run: $RUN_ID"
          find mlruns -name "*$RUN_ID*" 2>/dev/null || echo "Run not found in directory structure"
      
      - name: Check threshold
        run: python check_threshold.py --model-info-path model_info.txt --threshold 0.85
      
      - name: Mock Build
        if: success()
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"