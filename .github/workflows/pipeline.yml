name: Assignment 5 Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_accuracy:
        description: "Optional accuracy override (0.80 fail, 0.90 pass)"
        required: false
        default: ""

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
      SIMULATED_ACCURACY: ${{ github.event.inputs.force_accuracy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Set simulated accuracy
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_accuracy != '' }}
        run: echo "SIMULATED_ACCURACY=${{ github.event.inputs.force_accuracy }}" >> $GITHUB_ENV
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
      
      - name: Pull data with DVC
        run: dvc pull --allow-missing -v
      
      - name: Train model
        run: python train.py
      
      - name: Upload model_info
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
      
      - name: Upload mlruns
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-store
          path: mlruns

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Install dependencies
        run: pip install mlflow
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .
      
      - name: Download mlruns
        uses: actions/download-artifact@v4
        with:
          name: mlruns-store
          path: mlruns
      
      - name: Check threshold
        run: python check_threshold.py
      
      - name: Mock Build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Building Docker image for Run ID: $RUN_ID"